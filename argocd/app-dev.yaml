# DEV app: auto-sync, selfHeal OFF (last-write-wins per decision D7).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-argonaut-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/korzainc/hello-argonaut-gitops.git
    path: .
    targetRevision: main
    helm:
      valueFiles:
        - envs/dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-argonaut-dev
  syncPolicy:
    automated: { prune: true }
    syncOptions: [CreateNamespace=true]
